<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGP Lab2 — Route Map Tester</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; }

  header { background: #1a1d27; padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #2a2d3a; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status { margin-left: auto; font-size: 13px; color: #888; }
  header button { background: #3b82f6; color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  header button:hover { background: #2563eb; }
  header button:disabled { opacity: .5; cursor: wait; }

  .main { display: grid; grid-template-columns: 600px 1fr; height: calc(100vh - 49px); }

  /* Topology canvas */
  .topo-panel { background: #13151d; border-right: 1px solid #2a2d3a; position: relative; }
  svg { width: 100%; height: 100%; }
  .router-node { cursor: pointer; }
  .router-node circle { fill: #1e2433; stroke: #3b82f6; stroke-width: 2; transition: all .15s; }
  .router-node:hover circle { fill: #1a2744; stroke: #60a5fa; }
  .router-node.selected circle { fill: #1e3a5f; stroke: #60a5fa; stroke-width: 3; }
  .router-node.established circle { stroke: #22c55e; }
  .router-node.down circle { stroke: #ef4444; }
  .router-label { fill: #e0e0e0; font-size: 14px; font-weight: 600; text-anchor: middle; pointer-events: none; }
  .router-sub { fill: #888; font-size: 11px; text-anchor: middle; pointer-events: none; }
  .link-line { stroke: #2a3548; stroke-width: 2; }
  .link-line.active { stroke: #3b82f6; stroke-width: 2.5; }
  .link-label { fill: #555; font-size: 10px; text-anchor: middle; }

  /* Right panel */
  .detail-panel { display: flex; flex-direction: column; overflow: hidden; }

  .tabs { display: flex; background: #1a1d27; border-bottom: 1px solid #2a2d3a; }
  .tabs button { background: none; color: #888; border: none; padding: 10px 20px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabs button.active { color: #e0e0e0; border-bottom-color: #3b82f6; }
  .tabs button:hover { color: #bbb; }

  .tab-content { flex: 1; overflow: auto; padding: 16px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* State tab */
  pre.output { background: #0b0d13; border: 1px solid #2a2d3a; border-radius: 6px; padding: 12px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; color: #c8d0e0; margin-bottom: 12px; max-height: 300px; overflow: auto; }
  .section-title { font-size: 13px; font-weight: 600; color: #60a5fa; margin: 12px 0 6px; }
  .section-title:first-child { margin-top: 0; }

  /* Config tab */
  .config-area { display: flex; flex-direction: column; gap: 12px; height: 100%; }
  .config-area h3 { font-size: 14px; color: #60a5fa; }
  .config-area textarea { flex: 1; min-height: 150px; background: #0b0d13; color: #c8d0e0; border: 1px solid #2a2d3a; border-radius: 6px; padding: 12px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; resize: vertical; }
  .config-area .hint { font-size: 11px; color: #666; }
  .config-area button { align-self: flex-start; background: #22c55e; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .config-area button:hover { background: #16a34a; }
  .config-result { background: #0b0d13; border: 1px solid #2a2d3a; border-radius: 6px; padding: 12px; font-size: 12px; color: #c8d0e0; white-space: pre-wrap; min-height: 60px; }

  /* Command tab */
  .cmd-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .cmd-row input { flex: 1; background: #0b0d13; color: #c8d0e0; border: 1px solid #2a2d3a; border-radius: 6px; padding: 8px 12px; font-family: monospace; font-size: 13px; }
  .cmd-row button { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .quick-cmds { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .quick-cmds button { background: #1e2433; color: #aaa; border: 1px solid #2a2d3a; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
  .quick-cmds button:hover { background: #2a3548; color: #e0e0e0; }

  /* Overview tab */
  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .overview-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px; padding: 12px; }
  .overview-card h4 { font-size: 13px; color: #60a5fa; margin-bottom: 8px; cursor: pointer; }
  .overview-card h4:hover { color: #93bbfc; }
  .peer-row { font-size: 12px; padding: 2px 0; display: flex; justify-content: space-between; }
  .peer-status { font-weight: 600; }
  .peer-status.up { color: #22c55e; }
  .peer-status.down { color: #ef4444; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #555; border-top-color: #3b82f6; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .no-router { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>BGP Lab2 — Route Map Tester</h1>
  <button onclick="refreshAll()" id="btn-refresh">Refresh All</button>
  <span class="status" id="global-status">Click a router or Refresh All</span>
</header>

<div class="main">
  <!-- Left: topology -->
  <div class="topo-panel">
    <svg id="topo" viewBox="0 0 600 520"></svg>
  </div>

  <!-- Right: detail -->
  <div class="detail-panel">
    <div class="tabs">
      <button class="active" data-tab="overview">Overview</button>
      <button data-tab="state">State</button>
      <button data-tab="config">Config</button>
      <button data-tab="cmd">Command</button>
    </div>
    <div class="tab-content">

      <!-- Overview -->
      <div class="tab-pane active" id="tab-overview">
        <div class="overview-grid" id="overview-grid">
          <div class="no-router">Press Refresh All to load</div>
        </div>
      </div>

      <!-- State -->
      <div class="tab-pane" id="tab-state">
        <div id="state-content">
          <div class="no-router">Select a router from the topology</div>
        </div>
      </div>

      <!-- Config -->
      <div class="tab-pane" id="tab-config">
        <div id="config-content">
          <div class="no-router">Select a router from the topology</div>
        </div>
      </div>

      <!-- Command -->
      <div class="tab-pane" id="tab-cmd">
        <div id="cmd-content">
          <div class="no-router">Select a router from the topology</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const state = { selected: null, data: {} };

// --- Tabs ---
document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// --- Topology rendering ---
async function drawTopology() {
  const resp = await fetch('/api/topology');
  const topo = await resp.json();
  const svg = document.getElementById('topo');
  svg.innerHTML = '';

  // Links
  topo.links.forEach(link => {
    const a = topo.routers[link.from], b = topo.routers[link.to];
    const line = svgEl('line', {x1: a.x, y1: a.y, x2: b.x, y2: b.y, class: 'link-line', 'data-from': link.from, 'data-to': link.to});
    svg.appendChild(line);
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const label = svgEl('text', {x: mx, y: my - 6, class: 'link-label'});
    label.textContent = link.subnet;
    svg.appendChild(label);
    // Show IPs
    const ip1 = svgEl('text', {x: mx, y: my + 8, class: 'link-label'});
    ip1.textContent = `${link.from}:${link.ips[link.from]}  ${link.to}:${link.ips[link.to]}`;
    svg.appendChild(ip1);
  });

  // Routers
  Object.entries(topo.routers).forEach(([name, r]) => {
    const g = svgEl('g', {class: 'router-node', 'data-router': name, transform: `translate(${r.x},${r.y})`});
    g.appendChild(svgEl('circle', {r: 36}));
    const label = svgEl('text', {y: -4, class: 'router-label'});
    label.textContent = name;
    g.appendChild(label);
    const sub = svgEl('text', {y: 12, class: 'router-sub'});
    sub.textContent = `AS${r.as}`;
    g.appendChild(sub);
    g.addEventListener('click', () => selectRouter(name));
    svg.appendChild(g);
  });
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function selectRouter(name) {
  state.selected = name;
  document.querySelectorAll('.router-node').forEach(n => n.classList.remove('selected'));
  const node = document.querySelector(`.router-node[data-router="${name}"]`);
  if (node) node.classList.add('selected');
  renderDetail();
}

// --- Refresh all ---
async function refreshAll() {
  const btn = document.getElementById('btn-refresh');
  const status = document.getElementById('global-status');
  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> Fetching from all routers...';
  try {
    const resp = await fetch('/api/status');
    state.data = await resp.json();
    status.textContent = 'Updated ' + new Date().toLocaleTimeString();
    renderOverview();
    updateTopoColors();
    if (state.selected) renderDetail();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
  btn.disabled = false;
}

// --- Fetch single router ---
async function fetchRouter(name) {
  const status = document.getElementById('global-status');
  status.innerHTML = `<span class="spinner"></span> Fetching ${name}...`;
  try {
    const resp = await fetch(`/api/router/${name}/bgp`);
    const data = await resp.json();
    state.data[name] = {
      bgp_summary: data.bgp_summary,
      bgp_table: data.bgp_table,
      route_maps: data.route_maps,
      prefix_lists: data.prefix_lists,
      running_config: data.ip_route,  // reuse field for ip_route
    };
    status.textContent = `${name} updated ` + new Date().toLocaleTimeString();
    renderDetail();
    updateTopoColors();
  } catch (e) {
    status.textContent = 'Error: ' + e.message;
  }
}

// --- Overview ---
function renderOverview() {
  const grid = document.getElementById('overview-grid');
  if (!Object.keys(state.data).length) { grid.innerHTML = '<div class="no-router">No data yet</div>'; return; }
  grid.innerHTML = '';
  ['r1','r2','r3','r4'].forEach(name => {
    const d = state.data[name];
    if (!d) return;
    const card = document.createElement('div');
    card.className = 'overview-card';
    const peers = parseBgpSummary(d.bgp_summary);
    card.innerHTML = `<h4 onclick="selectRouter('${name}')">${name} (AS${name === 'r1' ? '65001' : name === 'r2' ? '65002' : name === 'r3' ? '65003' : '65004'})</h4>` +
      peers.map(p => `<div class="peer-row"><span>${p.neighbor}</span><span class="peer-status ${p.up ? 'up' : 'down'}">${p.state}</span></div>`).join('') +
      (peers.length === 0 ? '<div style="color:#666;font-size:12px">No peers found</div>' : '');
    grid.appendChild(card);
  });
}

function parseBgpSummary(text) {
  if (!text) return [];
  const peers = [];
  const lines = text.split('\n');
  for (const line of lines) {
    const m = line.match(/^(\d+\.\d+\.\d+\.\d+)\s+4\s+(\d+)\s+\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+(\S+)\s+(\S+)/);
    if (m) {
      const stateOrPfx = m[3];
      const isUp = /^\d+$/.test(stateOrPfx) || /^\d+$/.test(m[4]);
      peers.push({ neighbor: m[1], as: m[2], state: isUp ? `Established (${m[4]} pfx)` : stateOrPfx, up: isUp });
    }
  }
  return peers;
}

function updateTopoColors() {
  document.querySelectorAll('.router-node').forEach(node => {
    const name = node.dataset.router;
    node.classList.remove('established', 'down');
    const d = state.data[name];
    if (!d) return;
    const peers = parseBgpSummary(d.bgp_summary);
    if (peers.length && peers.every(p => p.up)) node.classList.add('established');
    else if (peers.length) node.classList.add('down');
  });
}

// --- Detail panels ---
function renderDetail() {
  const name = state.selected;
  if (!name) return;
  const d = state.data[name];

  // State tab
  const stateEl = document.getElementById('state-content');
  if (!d) {
    stateEl.innerHTML = `<div class="no-router">No data for ${name}. <a href="#" onclick="fetchRouter('${name}');return false;" style="color:#3b82f6">Fetch now</a></div>`;
  } else {
    stateEl.innerHTML =
      `<div class="section-title">BGP Summary — ${name}</div><pre class="output">${esc(d.bgp_summary)}</pre>` +
      `<div class="section-title">BGP IPv4 Table</div><pre class="output">${esc(d.bgp_table)}</pre>` +
      `<div class="section-title">Route Maps</div><pre class="output">${esc(d.route_maps || 'None configured')}</pre>` +
      `<div class="section-title">Prefix Lists</div><pre class="output">${esc(d.prefix_lists || 'None configured')}</pre>`;
  }

  // Config tab
  const configEl = document.getElementById('config-content');
  configEl.innerHTML = `
    <div class="config-area">
      <h3>Push Config to ${name}</h3>
      <p class="hint">Enter vtysh config-mode commands, one per line. "configure terminal" and "end" are added automatically.</p>
      <textarea id="config-input" placeholder="route-map PERMIT-ALL permit 10
!
router bgp 6500X
  neighbor X.X.X.X route-map PERMIT-ALL in
  neighbor X.X.X.X route-map PERMIT-ALL out"></textarea>
      <button onclick="pushConfig('${name}')">Apply Config</button>
      <div class="section-title">Result</div>
      <div class="config-result" id="config-result">—</div>
    </div>`;

  // Command tab
  const cmdEl = document.getElementById('cmd-content');
  cmdEl.innerHTML = `
    <h3 style="margin-bottom:8px">Run Show Command on ${name}</h3>
    <div class="quick-cmds">
      <button onclick="runCmd('${name}','show bgp summary')">bgp summary</button>
      <button onclick="runCmd('${name}','show bgp ipv4 unicast')">bgp table</button>
      <button onclick="runCmd('${name}','show ip route')">ip route</button>
      <button onclick="runCmd('${name}','show route-map')">route-maps</button>
      <button onclick="runCmd('${name}','show ip prefix-list')">prefix-lists</button>
      <button onclick="runCmd('${name}','show running-config')">running-config</button>
      <button onclick="runCmd('${name}','show bgp ipv4 unicast summary wide')">bgp wide</button>
      <button onclick="runCmd('${name}','show ip bgp neighbors')">bgp neighbors</button>
    </div>
    <div class="cmd-row">
      <input id="cmd-input" placeholder="show bgp ..." onkeydown="if(event.key==='Enter')runCmd('${name}',this.value)">
      <button onclick="runCmd('${name}',document.getElementById('cmd-input').value)">Run</button>
    </div>
    <pre class="output" id="cmd-output" style="flex:1;max-height:none">—</pre>`;
}

async function pushConfig(router) {
  const input = document.getElementById('config-input').value.trim();
  if (!input) return;
  const lines = input.split('\n').map(l => l.trim()).filter(l => l && l !== '!');
  const result = document.getElementById('config-result');
  result.textContent = 'Applying...';
  try {
    const resp = await fetch(`/api/router/${router}/config`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({lines})
    });
    const data = await resp.json();
    result.textContent = data.output || 'Done (no output)';
    // Auto-refresh this router
    fetchRouter(router);
  } catch (e) {
    result.textContent = 'Error: ' + e.message;
  }
}

async function runCmd(router, cmd) {
  if (!cmd) return;
  const output = document.getElementById('cmd-output');
  output.textContent = 'Running...';
  try {
    const resp = await fetch(`/api/router/${router}/cmd`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cmd})
    });
    const data = await resp.json();
    output.textContent = data.output || data.error || 'No output';
  } catch (e) {
    output.textContent = 'Error: ' + e.message;
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// Init
drawTopology();
</script>
</body>
</html>
